<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src https://seu-backend.render.com;">
</head>
<body>
    <div class="main">
        <h1>Progresso de Tarefas</h1>
        
        <div class="card">
            <p id="info-passo">Etapa atual: <span id="num-etapa">1</span></p>
            <div id="display-timer">Aguardando início...</div>
            
            <div class="actions">
                <button id="start">Começar agora</button>
                <button id="finish" disabled>Finalizar etapa</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
